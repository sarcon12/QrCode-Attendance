<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logging Out | QR Attendance System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">
</head>
<body>
    <div class="flex-center">
        <div class="glass-card" style="text-align: center; max-width: 350px;">
            <div class="spinner" style="border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <h2 style="margin: 0; font-size: 1.2rem;">Logging Out...</h2>
            <p style="color: #666; font-size: 14px; margin-top: 10px;">Safely clearing your session.</p>
        </div>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        localStorage.removeItem("currentUser");
        setTimeout(() => {
            window.location.href = "index.html";
        }, 1500);
    </script>
    <footer class="footer">Developed by <span>CYBERXEl</span></footer>
<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('SW registered!', reg);
      }).catch(err => console.log('SW registration failed', err));
    });
  }
</script>
</body>
</html>
