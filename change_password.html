<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password | QR Attendance System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="firebase-init.js?v=5"></script>
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">
</head>
<body>

<div class="flex-center">
    <main class="glass-card" style="width: 100%; max-width: 400px;">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Change <span class="title-gradient">Password</span></h2>
        <p style="text-align: center; font-size: 14px; color: #666; margin-bottom: 20px;">Enter your old password to set a new one.</p>
        
        <div>
            <input id="username" type="text" placeholder="Username" autocomplete="off">
            <input id="oldPass" type="password" placeholder="Old Password" autocomplete="off">
            <input id="newPass" type="password" placeholder="New Password" autocomplete="new-password">
            <input id="confirmPass" type="password" placeholder="Confirm New Password" autocomplete="new-password">
            <button id="updateBtn" class="btn btn-primary" onclick="updatePassword()">Update Password</button>
        </div>

        <div id="message" style="margin-top: 15px; text-align: center; font-weight: 700; font-size: 14px;"></div>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <a href="index.html" class="btn" style="background: #6c757d; color: white; padding: 12px; font-size: 14px;">Return to Login</a>
    </main>
</div>

<script>
async function updatePassword() {
    const u = document.getElementById("username").value.trim();
    const oldP = document.getElementById("oldPass").value;
    const newP = document.getElementById("newPass").value;
    const confP = document.getElementById("confirmPass").value;
    const msg = document.getElementById("message");
    const btn = document.getElementById("updateBtn");

    if (!u || !oldP || !newP || !confP) {
        msg.innerText = "❌ Please fill all fields!";
        msg.style.color = "var(--danger)";
        return;
    }

    if (newP.length < 4) {
        msg.innerText = "❌ New Password too short (min 4)";
        msg.style.color = "var(--danger)";
        return;
    }

    if (newP !== confP) {
        msg.innerText = "❌ New Passwords do not match!";
        msg.style.color = "var(--danger)";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Updating...";

    try {
        // Check if this is the admin account
        const adminCreds = await FB.get('settings/admin');
        if (adminCreds && u === adminCreds.username) {
            if (adminCreds.password !== oldP) {
                msg.innerText = "❌ Incorrect Old Password!";
                msg.style.color = "var(--danger)";
                btn.disabled = false;
                btn.innerText = "Update Password";
                return;
            }
            await FB.update('settings/admin', { password: newP });
            msg.innerText = "✅ Admin password updated successfully!";
            msg.style.color = "var(--success)";
            document.getElementById("oldPass").value = "";
            document.getElementById("newPass").value = "";
            document.getElementById("confirmPass").value = "";
            setTimeout(() => { window.location = "index.html"; }, 2000);
            return;
        }

        // Otherwise check students
        const students = await FB.get('students');
        let targetUserKey = null;

        for (let key in students) {
            if (students[key].username === u) {
                if (students[key].password === oldP) {
                    targetUserKey = key;
                } else {
                    msg.innerText = "❌ Incorrect Old Password!";
                    msg.style.color = "var(--danger)";
                    btn.disabled = false;
                    btn.innerText = "Update Password";
                    return;
                }
                break;
            }
        }

        if (!targetUserKey) {
            msg.innerText = "❌ Username not found!";
            msg.style.color = "var(--danger)";
            btn.disabled = false;
            btn.innerText = "Update Password";
            return;
        }

        await FB.update(`students/${targetUserKey}`, { password: newP });
        
        msg.innerText = "✅ Password updated successfully!";
        msg.style.color = "var(--success)";
        
        // Clear fields
        document.getElementById("oldPass").value = "";
        document.getElementById("newPass").value = "";
        document.getElementById("confirmPass").value = "";

        setTimeout(() => { window.location = "index.html"; }, 2000);

    } catch (err) {
        msg.innerText = "❌ Error: " + err.message;
        msg.style.color = "var(--danger)";
        btn.disabled = false;
        btn.innerText = "Update Password";
    }
}
</script>
    <footer class="footer">Developed by <span>CYBERXEl</span></footer>
<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('SW registered!', reg);
      }).catch(err => console.log('SW registration failed', err));
    });
  }
</script>
</body>
</html>
